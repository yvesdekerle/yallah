name: CI

on:
  push:
    branches: [main]
  pull_request:

# Stacked / rapidly-updated branches: cancel superseded runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # Fails the job if a chunk exceeds its gzip budget (regression ceiling).
      - run: npm run check:bundle
      # Fails if a tokenised colour literal (#fff surface, backdrop rgba, …)
      # reappears inline in src/components instead of using a YB.* token.
      - run: npm run check:css
      # Coverage thresholds in vite.config.ts make this the ratchet:
      # the job fails if coverage drops below the pinned floor.
      - run: npm test -- --coverage
