name: CI

on:
  push:
    branches: [main]
  pull_request:

# Stacked / rapidly-updated branches: cancel superseded runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # Coverage thresholds in vite.config.ts make this the ratchet:
      # the job fails if coverage drops below the pinned floor.
      - run: npm test -- --coverage
